name: Build Windows, Linux and macOS

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: dokebicollector-windows-x64
            binary_path: target/x86_64-pc-windows-msvc/release/dokebicollector.exe
            release_asset: dokebicollector-windows-x64.exe
          - name: linux-x64-musl
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: dokebicollector-linux-x64-musl
            binary_path: target/x86_64-unknown-linux-musl/release/dokebicollector
            release_asset: dokebicollector-linux-x64-musl
          - name: macos-intel
            os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: dokebicollector-macos-intel
            binary_path: target/x86_64-apple-darwin/release/dokebicollector
            release_asset: dokebicollector-macos-intel
          - name: macos-apple-silicon
            os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: dokebicollector-macos-apple-silicon
            binary_path: target/aarch64-apple-darwin/release/dokebicollector
            release_asset: dokebicollector-macos-apple-silicon

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux MUSL linker
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare release asset (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Copy-Item -Path "${{ matrix.binary_path }}" -Destination "${{ matrix.release_asset }}" -Force

      - name: Prepare release asset (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cp "${{ matrix.binary_path }}" "${{ matrix.release_asset }}"

      - name: Prepare release asset (macOS)
        if: matrix.os == 'macos-latest'
        run: cp "${{ matrix.binary_path }}" "${{ matrix.release_asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          if-no-files-found: error

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.release_asset }}
